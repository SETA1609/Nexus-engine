# Nexus-engine repository layout (Tier 2 — Forge)
# Status values: shipped | partial | stub | planned | legacy

meta:
  version: 1
  updated: "2026-07-15"
  project: Nexus-engine
  alias: Forge
  tier: 2
  repository: SETA1609/Nexus-engine
  role: Hybrid game engine — SceneNode tree + optional ECS + servers
  depends_on:
    name: zGameLib
    tier: 1
    # Local path dependency (sibling repo or git submodule)
    path: ../zGameLib
    layout: ../zGameLib/docs/file-tree.yml
    dependencies: ../zGameLib/docs/dependencies.yml

tree:
  - path: build.zig
    type: file
    status: shipped
    description: Build entry — `nexus` module + `nexus-engine` executable

  - path: build/
    type: directory
    status: planned
    description: build.zig helpers (v1.2.0)
    children:
      - path: compile_locale.zig
        type: file
        status: planned
        description: PO → JSON compile step for LocalizationSystem

  - path: build.zig.zon
    type: file
    status: shipped
    description: Depends on zGameLib via `.zgame = .{ .path = "../zGameLib" }`

  - path: LICENSE
    type: file
    status: planned
    description: Apache-2.0 (mirror zGameLib)

  - path: NOTICE
    type: file
    status: planned

  - path: LICENSING.md
    type: file
    status: planned

  - path: CONTRIBUTING.md
    type: file
    status: planned

  - path: AGENTS.md
    type: file
    status: shipped
    description: Agent / CI build instructions

  - path: src/
    type: directory
    description: Engine source
    children:
      - path: main.zig
        type: file
        status: shipped
        description: Minimal boot — platform init + event loop (to become NexusApp shell)
      - path: nexus/
        type: directory
        status: planned
        description: The `nexus` Zig module (engine API)
        children:
          - path: root.zig
            type: file
            status: planned
            description: Public exports
          - path: runtime/
            type: directory
            status: planned
            description: NexusApp, NexusContext, main loop
          - path: scene/
            type: directory
            status: planned
            description: SceneNode, SceneTree, Node2D/3D, signals
          - path: ecs/
            type: directory
            status: planned
            description: World interface, Flecs adapter, EcsBridge
          - path: servers/
            type: directory
            status: planned
            description: RenderingServer, PhysicsServer, DisplayServer (+ dummy backends)
          - path: resources/
            type: directory
            status: planned
            description: ResourceDB, texture, mesh, shader handles
          - path: editor/
            type: directory
            status: planned
            description: EditorHost API (consumed by Crucible / Link-editor)
          - path: i18n/
            type: directory
            status: planned
            description: LocalizationSystem, CompiledLocaleData (v1.2.0)
      - path: c/
        type: directory
        status: legacy
        description: Template leftover — not compiled by build.zig
      - path: cpp/
        type: directory
        status: legacy
        description: Template leftover — not compiled by build.zig

  - path: tests/
    type: directory
    status: planned
    description: Contract + behavioral TDD suites
    children:
      - path: contract/
        type: directory
        status: planned
        description: "`zig build test` — API + data invariants (gates CI)"
      - path: tdd/
        type: directory
        status: planned
        description: "`zig build test-tdd` — red→green behavioral suite"

  - path: locale/
    type: directory
    status: planned
    description: >
      Translator source (v1.2.0) — .pot template + per-lang .po under src/.
      Build emits res://locale/*.json; runtime never parses .po.
    children:
      - path: src/
        type: directory
        status: planned
        description: messages.pot, de/messages.po, en/messages.po, …

  - path: examples/
    type: directory
    description: >
      Reference apps — NOT shipped with the engine artifact. Separate
      `zig build <example>` targets; design docs in docs/examples/.
    children:
      - path: clear-color/
        type: directory
        status: planned
        description: v0.1.0 — NexusApp + RenderingServer
      - path: textured-quad/
        type: directory
        status: planned
        description: v0.2.0 — Sprite2D + ResourceDB
      - path: node-hierarchy/
        type: directory
        status: planned
        description: v0.2.0 — SceneTree reparent + transforms
      - path: ecs-basic/
        type: directory
        status: planned
        description: v0.3.0 — EcsBridge attach
      - path: hybrid-sync/
        type: directory
        status: planned
        description: v0.4.0 — transform sync
      - path: simple-movement/
        type: directory
        status: planned
        description: v0.5.0 — InputMap
      - path: camera/
        type: directory
        status: planned
        description: v0.6.0 — Camera2D
      - path: particles/
        type: directory
        status: planned
        description: v0.7.0 — ECS-only particles
      - path: debug-ui/
        type: directory
        status: planned
        description: v0.8.0 — profiler overlay
      - path: physics-ball/
        type: directory
        status: planned
        description: v0.9.0 — PhysicsServer
      - path: minimal-game/
        type: directory
        status: planned
        description: v1.0.0 — alpha sample game

  - path: docs/
    type: directory
    description: Engine documentation
    children:
      - path: ROADMAP.md
        type: file
        status: shipped
      - path: Nexus_Reference.md
        type: file
        status: shipped
        description: Authoritative API reference (API-first source)
      - path: architecture.md
        type: file
        status: shipped
      - path: file-tree.yml
        type: file
        status: shipped
        description: Repository layout (this file)
      - path: dependencies.yml
        type: file
        status: shipped
        description: Zig packages, transitive zGameLib deps, consumers
      - path: getting-started.md
        type: file
        status: shipped
      - path: crucible/
        type: directory
        status: shipped
        description: Crucible (Tier 3) editor docs — separate repo may follow later
        children:
          - path: README.md
            type: file
            status: shipped
      - path: theory/
        type: directory
        status: shipped
        description: Design rationale (00–07)
        children:
          - path: 06-ui-and-localization.md
            type: file
            status: shipped
            description: Immediate-mode UI; batcher HUD
          - path: 07-localization-system.md
            type: file
            status: shipped
            description: LocalizationSystem; build.zig PO→JSON pipeline
      - path: examples/
        type: directory
        status: shipped
        description: Per-example design docs + ladder (README, ladder, vision, mission)